name: Update ISAC Data

on:
  push:
    paths:
      - 'my-isac-dashboard/data/raw/isac.xlsx'
  workflow_dispatch:

jobs:
  process-data:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-isac-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: my-isac-dashboard/scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run ISAC processor
        run: python scripts/processor.py

      - name: Commit processed JSONs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/*.json data/processed/*.json
          git diff --staged --quiet || git commit -m "chore: update ISAC processed data [skip ci]"
          git push
